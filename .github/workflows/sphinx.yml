name: Deploy Sphinx documentation to Pages

on:
  push:
    branches:
      - main
      - 'release-[0-9]*.[0-9]*'
    tags:
      - 'v[0-9]*.[0-9]*.[0-9]*'
  workflow_dispatch:

concurrency:
  group: deploy-docs
  cancel-in-progress: false

env:
  PYTHONFAULTHANDLER: "1"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          lfs: true
          fetch-depth: 0

      - name: Fetch gh-pages branch
        run: |
          if git ls-remote --exit-code --heads origin gh-pages >/dev/null 2>&1; then
            git fetch origin gh-pages:gh-pages
          else
            echo "origin has no gh-pages branch yet; skipping fetch"
          fi

      - name: Determine doc version and mode
        id: dv
        run: |
          ref="${GITHUB_REF}"
          if [[ "$ref" == "refs/heads/main" ]]; then
            version="latest"
            metadata_only="false"
          elif [[ "$ref" =~ ^refs/heads/release-([0-9]+\.[0-9]+)$ ]]; then
            version="${BASH_REMATCH[1]}"
            metadata_only="false"
          elif [[ "$ref" =~ ^refs/tags/v([0-9]+\.[0-9]+)(\.|$) ]]; then
            version="${BASH_REMATCH[1]}"
            if git rev-parse --verify gh-pages >/dev/null 2>&1 \
               && git ls-tree --name-only "gh-pages" \
                  | grep -qE "^v${version}$"; then
              metadata_only="true"
            else
              metadata_only="false"
            fi
          else
            echo "::error::Unsupported ref '$ref'"
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "metadata_only=$metadata_only" >> "$GITHUB_OUTPUT"
          echo "Doc version: $version  (metadata_only=$metadata_only)"

      - name: Install uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
        with:
          version: "0.11.16"

      - name: Set up Python
        run: uv python install 3.10

      - name: Install documentation dependencies
        if: steps.dv.outputs.metadata_only != 'true'
        run: |
          uv venv --python 3.10
          uv pip install -e ".[docs]"

      - name: Build Sphinx documentation
        if: steps.dv.outputs.metadata_only != 'true'
        run: |
          SOMA_DOCS_AUDIENCE=public DOC_VERSION=${{ steps.dv.outputs.version }} \
            uv run sphinx-build -b html -W --keep-going docs docs/_build/html

      - name: Upload artifacts
        if: steps.dv.outputs.metadata_only != 'true'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: html-docs
          path: docs/_build/html/
          retention-days: ${{ github.repository == 'NVlabs/SOMA-X' && 7 || 1 }}

      - name: Deploy to gh-pages
        run: |
          flag=""
          if [[ "${{ steps.dv.outputs.metadata_only }}" == "true" ]]; then
            flag="--metadata-only"
          fi
          uv run --no-project tools/ci/deploy_doc.py --version "${{ steps.dv.outputs.version }}" $flag
          git push origin gh-pages
