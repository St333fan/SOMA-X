name: Build and publish py-soma-x

on:
  pull_request:
    branches:
      - main
      - 'release-[0-9]*.[0-9]*'
  push:
    branches:
      - main
      - 'release-[0-9]*.[0-9]*'
    tags:
      - 'v[0-9]*.[0-9]*.[0-9]*'
  workflow_dispatch:

jobs:
  build:
    name: Build distributions
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Check release version metadata
        id: version
        run: |
          expected=""
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            expected="${GITHUB_REF_NAME}"
          fi
          if [[ -n "$expected" ]]; then
            package_version="$(python tools/ci/check_release_version.py --expected "$expected")"
          else
            package_version="$(python tools/ci/check_release_version.py)"
          fi
          echo "package_version=$package_version" >> "$GITHUB_OUTPUT"
          echo "Package version: $package_version"

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine

      - name: Build source and wheel distributions
        run: |
          python -m build --sdist --wheel

      - name: Check distribution metadata
        run: |
          python -m twine check --strict dist/*

      - name: Smoke-test wheel metadata
        run: |
          python -m venv .pkg-smoke
          .pkg-smoke/bin/python -m pip install --upgrade pip
          .pkg-smoke/bin/python -m pip install --no-deps dist/*.whl
          .pkg-smoke/bin/python - <<'PY'
          import importlib.metadata as metadata

          version = metadata.version("py-soma-x")
          print(f"Installed py-soma-x wheel metadata version: {version}")
          PY

      - name: Upload distributions
        uses: actions/upload-artifact@v4
        with:
          name: py-soma-x-${{ steps.version.outputs.package_version }}-dists
          path: dist/*
          if-no-files-found: error
          retention-days: 7

  publish-testpypi:
    name: Publish to TestPyPI
    needs: build
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    environment:
      name: testpypi
      url: https://test.pypi.org/project/py-soma-x/
    permissions:
      id-token: write
    steps:
      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          pattern: py-soma-x-*-dists
          path: dist
          merge-multiple: true

      - name: Publish package distributions to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

  publish-pypi:
    name: Publish to PyPI
    needs: publish-testpypi
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/py-soma-x/
    permissions:
      id-token: write
    steps:
      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          pattern: py-soma-x-*-dists
          path: dist
          merge-multiple: true

      - name: Publish package distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
