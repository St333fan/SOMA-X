name: Build and publish py-soma-x

on:
  pull_request:
    branches:
      - main
      - 'release-[0-9]*.[0-9]*'
  push:
    branches:
      - main
      - 'release-[0-9]*.[0-9]*'
    tags:
      - 'v[0-9]*.[0-9]*.[0-9]*'
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing vX.Y.Z tag to publish a GitHub Release for."
        required: false
        type: string

jobs:
  build:
    name: Build distributions
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: true
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Check release version metadata
        id: version
        run: |
          expected=""
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            expected="${GITHUB_REF_NAME}"
          elif [[ -n "${{ inputs.tag }}" ]]; then
            expected="${{ inputs.tag }}"
          fi
          if [[ -n "$expected" ]]; then
            package_version="$(python tools/ci/check_release_version.py --expected "$expected")"
          else
            package_version="$(python tools/ci/check_release_version.py)"
          fi
          echo "package_version=$package_version" >> "$GITHUB_OUTPUT"
          echo "Package version: $package_version"

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine

      - name: Build source and wheel distributions
        run: |
          python -m build --sdist --wheel

      - name: Check distribution metadata
        run: |
          python -m twine check --strict dist/*

      - name: Smoke-test wheel metadata
        run: |
          python -m venv .pkg-smoke
          .pkg-smoke/bin/python -m pip install --upgrade pip
          .pkg-smoke/bin/python -m pip install --no-deps dist/*.whl
          .pkg-smoke/bin/python - <<'PY'
          import importlib.metadata as metadata

          version = metadata.version("py-soma-x")
          print(f"Installed py-soma-x wheel metadata version: {version}")
          PY

      - name: Upload distributions
        uses: actions/upload-artifact@v4
        with:
          name: py-soma-x-${{ steps.version.outputs.package_version }}-dists
          path: dist/*
          if-no-files-found: error
          retention-days: 7

  publish-testpypi:
    name: Publish to TestPyPI
    needs: build
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    environment:
      name: testpypi
      url: https://test.pypi.org/project/py-soma-x/
    permissions:
      id-token: write
    steps:
      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          pattern: py-soma-x-*-dists
          path: dist
          merge-multiple: true

      - name: Publish package distributions to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

  publish-pypi:
    name: Publish to PyPI
    needs: publish-testpypi
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/py-soma-x/
    permissions:
      id-token: write
    steps:
      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          pattern: py-soma-x-*-dists
          path: dist
          merge-multiple: true

      - name: Publish package distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  publish-github-release:
    name: Publish GitHub Release
    needs:
      - build
      - publish-pypi
    if: |
      always() &&
      needs.build.result == 'success' &&
      (
        (
          github.event_name == 'push' &&
          startsWith(github.ref, 'refs/tags/v') &&
          needs.publish-pypi.result == 'success'
        ) ||
        (
          github.event_name == 'workflow_dispatch' &&
          inputs.tag != ''
        )
      )
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: write
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          pattern: py-soma-x-*-dists
          path: dist
          merge-multiple: true

      - name: Extract release notes
        run: |
          python tools/ci/extract_release_notes.py \
            --tag "$RELEASE_TAG" \
            --output release-notes.md

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          title="${RELEASE_TAG}"
          if gh release view "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release edit "$RELEASE_TAG" \
              --repo "$GITHUB_REPOSITORY" \
              --title "$title" \
              --notes-file release-notes.md
            gh release upload "$RELEASE_TAG" dist/* \
              --repo "$GITHUB_REPOSITORY" \
              --clobber
          else
            gh release create "$RELEASE_TAG" dist/* \
              --repo "$GITHUB_REPOSITORY" \
              --title "$title" \
              --notes-file release-notes.md \
              --verify-tag
          fi
